<!DOCTYPE html>
<html>
<head>
    <title>Jiice Note</title>
    <style>
        body { background: #121212; color: white; padding: 20px; font-family: sans-serif; }
        .box { background: #1e1e1e; padding: 15px; margin-bottom: 10px; border-radius: 10px; }
        textarea { width: 100%; height: 100px; background: #333; color: white; border: none; }
        button { background: #40a9ff; border: none; padding: 10px; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Qor Qoraal Cusub</h2>
    <textarea id="noteText" placeholder="Halkan ku qor..."></textarea>
    <button onclick="saveNote()">Kaydi Qoraalka</button>

    <h3>Qoraalladii hore:</h3>
    <div id="notesContainer"></div>

    <script>
        function saveNote() {
            let text = document.getElementById('noteText').value;
            let notes = JSON.parse(localStorage.getItem('myNotes') || '[]');
            if(notes.length < 50) {
                notes.push(text);
                localStorage.setItem('myNotes', JSON.stringify(notes));
                displayNotes();
            } else {
                alert("Waxaad gaartay xadka 50 waraqadood!");
            }
        }

        function displayNotes() {
            let notes = JSON.parse(localStorage.getItem('myNotes') || '[]');
            document.getElementById('notesContainer').innerHTML = notes.map(n => `<div class="box">${n}</div>`).join('');
        }
        displayNotes();
    </script>
</body>
</html>
