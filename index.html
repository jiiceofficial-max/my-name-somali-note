<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somali Note Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: white; margin: 0; padding: 20px; }
        .header { font-size: 28px; font-weight: bold; margin-bottom: 30px; border-left: 5px solid #ffc107; padding-left: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .box { 
            background: #1e1e1e; padding: 25px; border-radius: 20px; 
            text-align: center; border: 1px solid #333; transition: 0.3s;
        }
        .box:hover { border-color: #ffc107; }
        .icon { font-size: 40px; margin-bottom: 10px; display: block; }
        .label { font-size: 14px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="header">My Notes</div>

<div class="grid">
    <div class="box"><span class="icon">📸</span><span class="label">Image</span></div>
    <div class="box"><span class="icon">🎨</span><span class="label">Drawing</span></div>
    <div class="box"><span class="icon">📝</span><span class="label">Text</span></div>
    <div class="box"><span class="icon">📋</span><span class="label">List</span></div>
</div>
<div class="box" style="margin-top: 20px;">
    <span class="icon">🎙️</span><span class="label">Voice Note</span>
</div>

</body>
</html>
