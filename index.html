<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jiice Note</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #333; }
        .icon { font-size: 30px; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h2>Jiice Note</h2>
    <div class="grid">
        <div class="box"><span class="icon">📸</span>Image</div>
        <div class="box"><span class="icon">🎨</span>Drawing</div>
        <div class="box"><span class="icon">📝</span>Text</div>
        <div class="box"><span class="icon">📋</span>List</div>
    </div>
    <div class="box" style="margin-top: 15px;"><span class="icon">🎙️</span>Voice Note</div>
</body>
</html>
